name: Build desktop installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  macos:
    name: Build macOS installer
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build macOS installer
        run: npm run pack:mac

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            dist/*.dmg
            dist/*.blockmap

  windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run pack:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.blockmap

  release:
    name: Publish desktop installers
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    needs:
      - macos
      - windows
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: dist

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist

      - name: Normalize installer names
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mv dist/*-mac.dmg "dist/catering-mep-renovation-cost-tool-${version}-mac.dmg"
          mv dist/*-win-x64.exe "dist/catering-mep-renovation-cost-tool-${version}-win-x64.exe"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: 商铺机电改造方案与成本测算 ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/catering-mep-renovation-cost-tool-*-mac.dmg
            dist/catering-mep-renovation-cost-tool-*-win-x64.exe
