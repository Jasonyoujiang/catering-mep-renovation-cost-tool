<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商铺机电改造方案与成本测算</title>
    <link rel="stylesheet" href="styles.css?v=20260521-batch-upload-polish">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">商业项目机电管理工具</p>
          <h1>商铺机电改造方案与成本测算</h1>
        </div>
        <p class="header-note">第一版为管理测算框架，计算逻辑和价格资料可逐步扩展。</p>
      </header>

      <section class="workspace" aria-label="商铺机电改造工具">
        <article class="panel">
          <div class="panel__header">
            <span>01</span>
            <div>
              <h2>单个商铺改造机电方案生成</h2>
              <p>输入面积和业态类型，生成一批机电配置参数。</p>
            </div>
          </div>

          <form class="form-grid" data-plan-form>
            <label>
              <span>商铺面积</span>
              <input data-area type="number" min="0" step="0.1" placeholder="例如 120">
            </label>
            <label>
              <span>业态类型</span>
              <select data-dining-type></select>
            </label>
            <label class="checkbox-field">
              <input data-specified-demand-toggle type="checkbox">
              <span>启用指定用电量</span>
            </label>
            <label>
              <span>指定用电量（kW）</span>
              <input data-specified-demand type="number" min="0" step="0.1" placeholder="例如 90" disabled>
            </label>
            <button type="submit">生成方案</button>
          </form>

          <div class="output-stack" data-plan-output></div>
          <p class="form-message" data-plan-message data-tone="neutral"></p>
        </article>

        <article class="panel">
          <div class="panel__header">
            <span>02</span>
            <div>
              <h2>机电改造成本查询</h2>
              <p>通过两级菜单查询子项规格和参考造价。</p>
            </div>
          </div>

          <form class="form-grid" data-cost-form>
            <label>
              <span>造价子项</span>
              <select data-cost-category>
                <option value="">请选择子项</option>
              </select>
            </label>
            <label>
              <span>规格型号</span>
              <select data-cost-specification disabled>
                <option value="">请选择规格型号</option>
              </select>
            </label>
            <button type="submit">查询造价</button>
          </form>

          <div class="output-stack" data-cost-output></div>
          <p class="form-message" data-cost-message data-tone="neutral"></p>
        </article>

        <article class="panel panel--wide">
          <div class="panel__header">
            <span>03</span>
            <div>
              <h2>批量商铺机电改造方案生成</h2>
              <p>上传商铺 Excel，按现有规则批量生成机电条件并下载结果表。</p>
            </div>
          </div>

          <form class="form-grid batch-form" data-batch-form>
            <label class="file-field">
              <span>商铺 Excel</span>
              <input data-batch-file class="file-field__input" type="file" accept=".xlsx,.xls">
              <span class="file-picker">
                <span class="file-picker__badge">XLSX</span>
                <span class="file-picker__content">
                  <strong data-batch-file-name>未选择文件</strong>
                  <small>支持 .xlsx / .xls 模板文件</small>
                </span>
                <span class="file-picker__action">选择文件</span>
              </span>
            </label>
            <button type="button" data-template-download>下载 Excel 模板</button>
            <button type="submit">生成结果 Excel</button>
          </form>

          <div class="output-stack" data-batch-output></div>
          <p class="form-message" data-batch-message data-tone="neutral"></p>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="data/cable-table.js?v=20260520-cable-selection-v2"></script>
    <script src="data/rules.js?v=20260521-optional-area"></script>
    <script src="data/imported-cost-menu.js?v=20260521-cost-menu-import"></script>
    <script src="data/items.js?v=20260521-cost-menu-import"></script>
    <script src="data/batch.js?v=20260521-existing-cable-deduction"></script>
    <script src="app.js?v=20260521-batch-upload-polish"></script>
  </body>
</html>
